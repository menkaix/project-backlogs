spring.datasource.driver-class-name=mongodb.jdbc.MongoDriver
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.host=${MONGODB_HOST:127.0.0.1}
spring.data.mongodb.database=projects
spring.data.mongodb.port=27017
spring.data.mongodb.username=${MONGODB_USER:user}
spring.data.mongodb.password=${MONGODB_PASSWORD:password}
spring.data.mongodb.authentication-database=admin

gcp.config.project=${GCP_PROJECT:your-google-cloud-project-id}
gcp.config.location=${GCP_LOCATION:europe-west1}
gemini.config.model=code-bison
gemini.config.publisher=google

# MCP Server
spring.ai.mcp.server.enabled=true
spring.ai.mcp.server.protocol=SSE
spring.ai.mcp.server.name=backlogs-mcp-server
spring.ai.mcp.server.request-timeout=300
spring.ai.mcp.server.sse-endpoint=sse

# API Key Security
app.security.api-key=${MY_API_KEY:your-secret-api-key-here}
